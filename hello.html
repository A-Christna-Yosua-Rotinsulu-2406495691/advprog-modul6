<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Hello!</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f0f2f5;
                color: #333;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            .card {
                background: white;
                padding: 40px 60px;
                border-radius: 12px;
                box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
                text-align: center;
            }
            h1 {
                color: #2c3e50;
                font-size: 2.5rem;
                margin-top: 0;
                margin-bottom: 10px;
            }
            p {
                font-size: 1.2rem;
                color: #555;
                margin: 0;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Hello!</h1>
            <p>Hi from Rust, running from yosua’s machine.</p>
        </div>
    </body>
</html>
